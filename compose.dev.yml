services:
  api:
    build:
      context: .
      target: dev
    environment:
      NODE_ENV: development
      AWS_S3_ENDPOINT: http://minio:9000
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - internal
      - public

  postgres:
    ports:
      - "5432:5432"
    networks:
      - internal
      - public

  minio:
    image: minio/minio:latest
    container_name: fb-files-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_fb_files_module:/data
    networks:
      - internal
      - public

  minio-init:
    image: minio/mc:latest
    container_name: fb-files-minio-init
    depends_on:
      - minio
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-farmbox-files-private};
      mc anonymous set none local/${AWS_S3_BUCKET:-farmbox-files-private};
      echo 'minio bucket is ready';
      "
    networks:
      - internal

volumes:
  minio_fb_files_module:
    name: fb-minio-data
