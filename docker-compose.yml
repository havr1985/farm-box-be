services:
  postgres:
    image: postgres:16-alpine
    container_name: fb-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-farmbox} -d ${DB_NAME:-farmbox}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fb-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: fb-files-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_fb_files_module:/data
    networks:
      - fb-network

  minio-init:
    image: minio/mc:latest
    container_name: fb-files-minio-init
    depends_on:
      - minio
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-farmbox-files-private};
      mc anonymous set none local/${AWS_S3_BUCKET:-farmbox-files-private};
      echo 'minio bucket is ready';
      "
    networks:
      - fb-network

networks:
  fb-network:
    driver: bridge
    name: farmbox-network

volumes:
  postgres_data:
    name: fb-postgres-data
  minio_fb_files_module:
    name: fb-minio-data
