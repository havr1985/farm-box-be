services:
  postgres:
    image: postgres:16-alpine
    container_name: fb-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped


  migrate:
    build:
      context: .
      target: migrate
    container_name: fb-migrate
    profiles: ["tools"]
    env_file: .env
    environment:
      DB_HOST: postgres
    init: true
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal


  seed:
    build:
      context: .
      target: seed
    container_name: fb-seed
    profiles: ["tools"]
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal


  api:
    build:
      context: .
      target: prod
    container_name: fb-api
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    ports:
      - "8080:${APP_PORT:-3000}"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-3000}/api/v1/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    init: true
    stop_grace_period: 10s
    deploy:
      resources: {}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  pgdata:
    name: fb-pgdata